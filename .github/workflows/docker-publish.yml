# .github/workflows/docker-publish.yml
# Builds backend and frontend Docker images and pushes them to
# GitHub Container Registry (ghcr.io) on every push to main.
#
# Images:
#   ghcr.io/baumi1100/pat-backend:latest
#   ghcr.io/baumi1100/pat-frontend:latest
#
# After this workflow runs you can deploy with:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

name: Build & Publish Docker Images

on:
  push:
    branches: [main]

jobs:
  # ── Backend (FastAPI + Celery + Telegram bot) ────────────────────────────
  build-backend:
    name: Backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: ghcr.io/baumi1100/pat-backend:latest
          # GitHub Actions cache keeps TeX Live + pip layers between runs
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          labels: |
            org.opencontainers.image.source=https://github.com/Baumi1100/PAT
            org.opencontainers.image.description=PAT backend (FastAPI + Celery)
            org.opencontainers.image.licenses=Apache-2.0

  # ── Frontend (Next.js) ───────────────────────────────────────────────────
  build-frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/baumi1100/pat-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          labels: |
            org.opencontainers.image.source=https://github.com/Baumi1100/PAT
            org.opencontainers.image.description=PAT frontend (Next.js 15)
            org.opencontainers.image.licenses=Apache-2.0
